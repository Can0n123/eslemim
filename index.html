<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Sana Çok Aşığım ❤️</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    text-align: center;
    font-family: Arial;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  }

  h1 {
    margin-top: 100px;
    font-size: 35px;
    color: white;
  }

  .btn {
    padding: 15px 30px;
    font-size: 20px;
    margin: 20px;
    border: none;
    border-radius: 15px;
    cursor: pointer;
  }

  #yes {
    background: #28a745;
    color: white;
  }

  #no {
    background: #dc3545;
    color: white;
    position: absolute;
  }

  /* Kalpler */
  .heart {
    position: fixed;
    bottom: -10px;
    color: red;
    font-size: 20px;
    animation: floatUp 5s linear infinite;
  }

  @keyframes floatUp {
    0% {
      transform: translateY(0);
      opacity: 1;
    }
    100% {
      transform: translateY(-100vh);
      opacity: 0;
    }
  }

  canvas {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
  }
</style>
</head>

<body>

<h1>Sana Çok Aşığım Seni Kaçıracam ❤️</h1>

<button id="yes" class="btn">Evet 💖</button>
<button id="no" class="btn">Hayır 😅</button>

<audio id="music" loop>
  <source src="sarki.mp3" type="audio/mpeg">
</audio>

<canvas id="confetti"></canvas>

<script>
const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");
const music = document.getElementById("music");

/* Müziği başlat (ilk tıklamada) */
document.body.addEventListener("click", () => {
  music.play();
}, { once: true });

/* Hayır butonu kaçıyor */
noBtn.addEventListener("mouseover", () => {
  const x = Math.random() * (window.innerWidth - 100);
  const y = Math.random() * (window.innerHeight - 50);

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
});

/* Kalpler oluştur */
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 20 + 10) + "px";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}

setInterval(createHeart, 300);

/* Konfeti */
const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let confettis = [];

function createConfetti() {
  for (let i = 0; i < 200; i++) {
    confettis.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: Math.random() * 5 + 2,
      speed: Math.random() * 3 + 2
    });
  }
}

function drawConfetti() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  confettis.forEach((c, i) => {
    ctx.fillStyle = "hsl(" + Math.random() * 360 + ", 100%, 50%)";
    ctx.fillRect(c.x, c.y, c.size, c.size);
    c.y += c.speed;

    if (c.y > canvas.height) {
      confettis.splice(i, 1);
    }
  });

  requestAnimationFrame(drawConfetti);
}

/* Evet'e basınca */
yesBtn.onclick = () => {
  createConfetti();
  drawConfetti();

  document.body.innerHTML += "<h1 style='color:white;'>Artık resmensin ❤️</h1>";
};
</script>

</body>
</html>
