<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Programmed Love</title>
    <style>
        body {
            background-color: #000;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            perspective: 1000px;
        }

        #heart-container {
            position: relative;
            width: 600px;
            height: 600px;
            transform-style: preserve-3d;
        }

        .love-text {
            position: absolute;
            color: #ff5e99;
            font-family: 'Arial', sans-serif;
            font-size: 13px;
            font-weight: bold;
            white-space: nowrap;
            text-shadow: 0 0 10px #ff5e99;
            pointer-events: none;
            animation: heart-anim 2.5s infinite linear;
            opacity: 0;
        }

        @keyframes heart-anim {
            0% { transform: translate(-50%, -50%) scale(0.6); opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.1); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="heart-container">
        <!-- İsim kısmı kaldırıldı -->
    </div>

    <script>
        const container = document.getElementById('heart-container');
        const textContent = "I love you"; 
        const total = 120; 

        function createHeart() {
            for (let i = 0; i < total; i++) {
                const span = document.createElement('span');
                span.className = 'love-text';
                span.innerText = textContent;

                const t = (i / total) * 2 * Math.PI;
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));

                const multiplier = 16; 
                const left = 300 + x * multiplier;
                const top = 300 + y * multiplier;

                span.style.left = `${left}px`;
                span.style.top = `${top}px`;

                const delay = Math.random() * 2.5;
                span.style.animationDelay = `${delay}s`;

                container.appendChild(span);
            }
        }

        createHeart();
    </script>
</body>
</html>
