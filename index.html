<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programmed Love - Ada</title>
    <style>
        body {
            background-color: #000;
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            perspective: 1000px;
            cursor: pointer;
        }

        #music-hint {
            position: fixed;
            top: 20px;
            color: rgba(255, 94, 153, 0.5);
            font-family: sans-serif;
            font-size: 14px;
            pointer-events: none;
            z-index: 200;
        }

        #heart-container {
            position: relative;
            width: 600px;
            height: 600px;
            transform-style: preserve-3d;
        }

        /* ADA Yazısı - Tam Merkezde */
        .center-name {
            position: absolute;
            left: 50%;
            top: 50%;
            /* Yazıyı tam merkeze sabitlemek için translate kullanıyoruz */
            transform: translate(-50%, -50%);
            color: #ff5e99;
            font-family: 'Arial', sans-serif;
            font-size: 80px;
            font-weight: bold;
            text-shadow: 0 0 20px #ff5e99, 0 0 40px #ff2d75, 0 0 60px #ff2d75;
            z-index: 100;
            text-align: center;
            animation: pulse-name 1.2s ease-in-out infinite;
        }

        @keyframes pulse-name {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
        }

        /* Etraftaki Küçük Yazılar */
        .love-text {
            position: absolute;
            color: #ff5e99;
            font-family: 'Arial', sans-serif;
            font-size: 13px;
            font-weight: bold;
            white-space: nowrap;
            text-shadow: 0 0 10px #ff5e99;
            pointer-events: none;
            animation: heart-anim 2.5s infinite linear;
            opacity: 0;
        }

        @keyframes heart-anim {
            0% { transform: translate(-50%, -50%) scale(0.6); opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.1); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="music-hint">Müziği başlatmak için ekrana tıkla</div>

    <!-- Ses Dosyası -->
    <audio id="bgMusic" loop>
        <source src="sarki.mp3" type="audio/mpeg">
    </audio>

    <div id="heart-container">
        <!-- Kalbin tam ortasındaki isim -->
        <div class="center-name">Ada</div>
    </div>

    <script>
        const container = document.getElementById('heart-container');
        const music = document.getElementById('bgMusic');
        const hint = document.getElementById('music-hint');
        const textContent = "I love you"; 
        const total = 120; 

        function createHeart() {
            for (let i = 0; i < total; i++) {
                const span = document.createElement('span');
                span.className = 'love-text';
                span.innerText = textContent;

                const t = (i / total) * 2 * Math.PI;
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));

                const multiplier = 18; 
                const left = 300 + x * multiplier;
                const top = 300 + y * multiplier;

                span.style.left = `${left}px`;
                span.style.top = `${top}px`;

                const delay = Math.random() * 2.5;
                span.style.animationDelay = `${delay}s`;

                container.appendChild(span);
            }
        }

        // Tıklama ile müziği ve deneyimi başlat
        document.body.addEventListener('click', () => {
            music.play().then(() => {
                hint.style.display = "none";
            }).catch(e => {
                console.error("Müzik başlatılamadı:", e);
                alert("Müzik dosyası 'sarki.mp3' bulunamadı veya oynatılamıyor!");
            });
        }, { once: true });

        createHeart();
    </script>
</body>
</html>
